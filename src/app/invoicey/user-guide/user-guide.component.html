<div class="user-guide-page">
    <header class="guide-header">
        <div class="container header-content">
            <a routerLink="/invoicey" class="back-link">
                <span class="material-symbols-outlined">arrow_back</span> Back to Invoicey
            </a>
            <h1 class="gradient-title">Invoicey User Guide</h1>
            <p class="subtitle">Complete solution for professional invoicing and business management</p>
        </div>
    </header>

    <div class="container guide-layout">
        <!-- Sticky Sidebar Navigation -->
        <aside class="guide-sidebar" [class.menu-open]="isMobileMenuOpen">
            <div class="mobile-menu-toggle" (click)="toggleMobileMenu()">
                <h3>Contents</h3>
                <span class="material-symbols-outlined">{{ isMobileMenuOpen ? 'expand_less' : 'expand_more' }}</span>
            </div>
            <nav class="sidebar-nav">
                <h3 class="desktop-only">Contents</h3>
                <ul>
                    @for (section of sections; track section.id) {
                    <li>
                        <a [routerLink]="['/invoicey/user-guide', section.id]" routerLinkActive="active" class="nav-item" (click)="isMobileMenuOpen = false">
                            {{ section.title }}
                        </a>
                    </li>
                    }
                </ul>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="guide-content">
            <router-outlet></router-outlet>
        </main>
    </div>
</div>
